<nav class="navbar">
    <div class="container">
        <div class="navbar-brand">
            <a href="{{ url_for('main.index') }}" class="navbar-logo">
                🎯 Resume Tailor
            </a>
        </div>

        <div class="navbar-menu">
            <a href="{{ url_for('main.index') }}" class="nav-link {% if request.endpoint == 'main.index' %}active{% endif %}">
                Dashboard
            </a>
            <a href="{{ url_for('jobs.list_jobs') }}" class="nav-link {% if request.endpoint and request.endpoint.startswith('jobs.') %}active{% endif %}">
                Jobs
            </a>
            <a href="{{ url_for('tailoring.tailor_home') }}" class="nav-link {% if request.endpoint and request.endpoint.startswith('tailoring.') %}active{% endif %}">
                Tailor
            </a>
            <a href="{{ url_for('resume.view_resume') }}" class="nav-link {% if request.endpoint and request.endpoint.startswith('resume.') %}active{% endif %}">
                Resume
            </a>
            <a href="{{ url_for('export.export_home') }}" class="nav-link {% if request.endpoint and request.endpoint.startswith('export.') %}active{% endif %}">
                Export
            </a>
            <a href="{{ url_for('suggestions.view_suggestions') }}" class="nav-link {% if request.endpoint and request.endpoint.startswith('suggestions.') %}active{% endif %}">
                Suggestions{% if pending_suggestions_count %} <span class="nav-badge">{{ pending_suggestions_count }}</span>{% endif %}
            </a>
        </div>
        {% if config.LOGIN_PASSWORD and session.get('authenticated') %}
        <form method="POST" action="{{ url_for('main.logout') }}" style="margin:0">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button type="submit" class="nav-link" style="background:none;border:none;cursor:pointer;">Logout</button>
        </form>
        {% endif %}
    </div>
</nav>
