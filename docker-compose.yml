services:
  resume-tailor:
    build: .
    container_name: resume-tailor-app
    ports:
      - "8080:5000"
    environment:
      # Required: Get your API key from https://console.anthropic.com/settings/keys
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Required: Flask secret key for session encryption and CSRF protection
      # Generate with: python -c "import secrets; print(secrets.token_hex(32))"
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      # Optional: password to protect the app. Leave unset to disable auth.
      - LOGIN_PASSWORD=${LOGIN_PASSWORD}
    volumes:
      # Persist database
      - ./data:/app/data
      # Persist uploaded files
      - ./uploads:/app/uploads
      # Persist session data
      - ./flask_session:/app/flask_session
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  session-cleanup:
    image: alpine:3
    volumes:
      - ./flask_session:/flask_session
    restart: unless-stopped
    # Delete session files not accessed in 7+ days; runs once every 24 hours
    command: >
      sh -c "while true; do find /flask_session -type f -atime +7 -delete; sleep 86400; done"
